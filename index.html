<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Math Practice</title>

<style>

body{
font-family:Segoe UI;
background:#f5f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
width:420px;
}

button{
margin:5px;
padding:10px;
border:none;
border-radius:6px;
background:#6c5ce7;
color:white;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

input{
padding:10px;
font-size:18px;
text-align:center;
width:120px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<!-- MODE SELECT -->

<div id="modeSelect">
<h2>Select Practice</h2>
<button onclick="chooseMode('table')">Tables</button>
<button onclick="chooseMode('cube')">Cubes</button>
<button onclick="chooseMode('square')">Squares</button>
</div>

<!-- NUMBER SELECT -->

<div id="numberSelect" class="hidden">
<h2>Select Number</h2>
<div id="numberGrid" class="grid"></div>
<button onclick="goMode()">Back</button>
</div>

<!-- SET SELECT -->

<div id="setSelect" class="hidden">
<h2>Select Set</h2>
<div id="setButtons"></div>
<button onclick="goNumbers()">Back</button>
</div>

<!-- QUIZ AREA -->

<div id="quizArea" class="hidden">

<h2 id="question"></h2>

<input type="number" id="answer">
<br>

<button onclick="checkAnswer()">Submit</button> <button id="nextBtn" onclick="generateQuestion()" style="display:none">Next</button>

<div id="result"></div>
<div id="score"></div>

<button onclick="goSets()">Change Set</button>

</div>

</div>

<script>

let mode=""
let selectedNumber=1

let minRange=1
let maxRange=10

let score=0
let total=0

let randomNumber

// shuffle system
let questionPool=[]
let poolIndex=0


function chooseMode(type){

mode=type

document.getElementById("modeSelect").classList.add("hidden")
document.getElementById("numberSelect").classList.remove("hidden")

let grid=document.getElementById("numberGrid")
grid.innerHTML=""

let limit=30

if(mode==="square") limit=50

for(let i=1;i<=limit;i++){

let btn=document.createElement("button")
btn.innerText=i

btn.onclick=function(){
chooseNumber(i)
}

grid.appendChild(btn)

}

}


function chooseNumber(num){

selectedNumber=num

document.getElementById("numberSelect").classList.add("hidden")
document.getElementById("setSelect").classList.remove("hidden")

let container=document.getElementById("setButtons")
container.innerHTML=""

let sets=[]

if(mode==="square"){

sets=[
[1,10],
[11,20],
[21,30],
[31,40],
[41,50]
]

}
else{

sets=[
[1,10],
[11,20],
[21,30]
]

}

sets.forEach(set=>{

let btn=document.createElement("button")

btn.innerText=set[0]+" - "+set[1]

btn.onclick=function(){
startGame(set[0],set[1])
}

container.appendChild(btn)

})

}


function startGame(min,max){

minRange=min
maxRange=max

score=0
total=0

// create number pool
questionPool=[]

for(let i=minRange;i<=maxRange;i++){
questionPool.push(i)
}

// shuffle numbers
questionPool.sort(()=>Math.random()-0.5)

poolIndex=0

document.getElementById("setSelect").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

generateQuestion()

}


function generateQuestion(){

document.getElementById("answer").value=""
document.getElementById("result").innerText=""
document.getElementById("nextBtn").style.display="none"

if(poolIndex>=questionPool.length){

// reshuffle again
questionPool.sort(()=>Math.random()-0.5)
poolIndex=0

}

randomNumber=questionPool[poolIndex]
poolIndex++


if(mode==="table"){

document.getElementById("question").innerText=
selectedNumber+" × "+randomNumber+" = ?"

}

else if(mode==="cube"){

document.getElementById("question").innerText=
randomNumber+"³ = ?"

}

else if(mode==="square"){

document.getElementById("question").innerText=
randomNumber+"² = ?"

}

document.getElementById("answer").focus()

}


function checkAnswer(){

let user=parseInt(document.getElementById("answer").value)

if(isNaN(user)){
alert("Enter answer")
return
}

let correct

if(mode==="table") correct=selectedNumber*randomNumber
if(mode==="cube") correct=randomNumber**3
if(mode==="square") correct=randomNumber**2

total++

if(user===correct){

score++

document.getElementById("result").innerText="Correct 🎉"

document.getElementById("score").innerText=
"Score: "+score+" / "+total

setTimeout(generateQuestion,800)

}
else{

document.getElementById("result").innerText=
"Wrong! Correct answer: "+correct

document.getElementById("score").innerText=
"Score: "+score+" / "+total

document.getElementById("nextBtn").style.display="inline-block"

}

}


function goMode(){

document.getElementById("numberSelect").classList.add("hidden")
document.getElementById("modeSelect").classList.remove("hidden")

}

function goNumbers(){

document.getElementById("setSelect").classList.add("hidden")
document.getElementById("numberSelect").classList.remove("hidden")

}

function goSets(){

document.getElementById("quizArea").classList.add("hidden")
document.getElementById("setSelect").classList.remove("hidden")

}


document.getElementById("answer").addEventListener("keydown",function(e){

if(e.key==="Enter"){

if(document.getElementById("nextBtn").style.display==="inline-block"){
generateQuestion()
}
else{
checkAnswer()
}

}

})

</script>

</body>
</html>
