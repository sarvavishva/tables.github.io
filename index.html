<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Practice</title>

<style>

:root{
--primary:#6c5ce7;
--success:#2ecc71;
--error:#e74c3c;
--bg:#f5f6fa;
}

body{
font-family:Segoe UI;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
width:400px;
max-width:95%;
}

button{
display:block;
width:100%;
margin:6px 0;
padding:10px;
border:none;
border-radius:6px;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

input{
width:120px;
padding:10px;
font-size:18px;
text-align:center;
border:2px solid #ddd;
border-radius:6px;
}

.correct{
border-color:var(--success);
background:#f1fef5;
}

.incorrect{
border-color:var(--error);
background:#fff5f5;
}

.hidden{
display:none;
}

#result,#score{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<!-- MODE -->

<div id="modeSelect">

<h2>Select Practice</h2>

<button onclick="chooseMode('table')">Tables</button>
<button onclick="chooseMode('square')">Squares</button>
<button onclick="chooseMode('cube')">Cubes</button>

</div>


<!-- NUMBER SELECT -->

<div id="numberSelect" class="hidden">

<h2 id="selectTitle"></h2>

<div id="numberGrid" class="grid"></div>

<button onclick="goHome()">Back</button>

</div>


<!-- QUIZ -->

<div id="quizArea" class="hidden">

<h2 id="question"></h2>

<input type="number" id="answer">

<br>

<button onclick="checkAnswer()">Submit</button>

<button id="nextBtn" onclick="generateQuestion()" style="display:none">
Next Question
</button>

<div id="result"></div>
<div id="score"></div>

<button onclick="backToNumbers()">Change Number</button>

</div>

</div>

<script>

let mode=""
let selectedNumber=1

let score=0
let total=0
let randomNumber


function chooseMode(type){

mode=type

document.getElementById("modeSelect").classList.add("hidden")
document.getElementById("numberSelect").classList.remove("hidden")

const grid=document.getElementById("numberGrid")
grid.innerHTML=""

let limit=30

if(mode==="square") limit=50
if(mode==="cube") limit=30

document.getElementById("selectTitle").innerText="Select Number"

for(let i=1;i<=limit;i++){

let btn=document.createElement("button")
btn.innerText=i
btn.onclick=function(){startGame(i)}

grid.appendChild(btn)

}

}


function startGame(num){

selectedNumber=num

score=0
total=0

document.getElementById("numberSelect").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

generateQuestion()

}


function generateQuestion(){

document.getElementById("answer").value=""
document.getElementById("answer").className=""
document.getElementById("result").innerText=""
document.getElementById("nextBtn").style.display="none"

randomNumber=Math.floor(Math.random()*10)+1

if(mode==="table"){

document.getElementById("question").innerText=
selectedNumber+" × "+randomNumber+" = ?"

}

else if(mode==="square"){

document.getElementById("question").innerText=
selectedNumber+"² = ?"

}

else if(mode==="cube"){

document.getElementById("question").innerText=
selectedNumber+"³ = ?"

}

document.getElementById("answer").focus()

}


function checkAnswer(){

const userAnswer=parseInt(document.getElementById("answer").value)

if(isNaN(userAnswer)){
alert("Enter answer")
return
}

let correctAnswer

if(mode==="table"){
correctAnswer=selectedNumber*randomNumber
}

else if(mode==="square"){
correctAnswer=selectedNumber*selectedNumber
}

else if(mode==="cube"){
correctAnswer=selectedNumber*selectedNumber*selectedNumber
}

total++

if(userAnswer===correctAnswer){

score++

document.getElementById("result").innerText="Correct 🎉"
document.getElementById("answer").className="correct"

document.getElementById("score").innerText=
"Score: "+score+" / "+total

setTimeout(generateQuestion,800)

}

else{

document.getElementById("result").innerText=
"Wrong! Correct answer: "+correctAnswer

document.getElementById("answer").className="incorrect"

document.getElementById("score").innerText=
"Score: "+score+" / "+total

document.getElementById("nextBtn").style.display="inline-block"

}

}


function goHome(){

document.getElementById("numberSelect").classList.add("hidden")
document.getElementById("modeSelect").classList.remove("hidden")

}

function backToNumbers(){

document.getElementById("quizArea").classList.add("hidden")
document.getElementById("numberSelect").classList.remove("hidden")

}


/* ENTER KEY */

document.getElementById("answer").addEventListener("keydown",function(e){

if(e.key==="Enter"){

if(document.getElementById("nextBtn").style.display==="inline-block"){
generateQuestion()
}else{
checkAnswer()
}

}

})

</script>

</body>
</html>
